services:
  api:
    build: .
    depends_on:
      - postgres
    ports:
      - 8000:8000
    # env_file:
    #   - ./.env
    environment:
      - DATABASE_PASSWORD=${TESTING_PASSWORD}
      - DATABASE_USERNAME=${TESTING_USERNAME}
      - DATABASE_HOSTNAME=${TESTING_HOSTNAME}
      - DATABASE_PORT=5432
      - DATABASE_NAME=${TESTING_NAME}

      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}  
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    volumes:
      - ./:/app
    command: "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:18.4
    ports:
      - 5433:5432
    environment:
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_USER=postgres
      - POSTGRES_DB=fastapi
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
  