name: Build and Deploy code
on: [push,pull_request] #we can change behaviour accordign to branches but we have one one branch

jobs:
  setting-up:
    environment: 
      name: Testing
    env: 
      DATABASE_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
      DATABASE_USERNAME: ${{vars.DATABASE_USERNAME}}
      DATABASE_HOSTNAME: ${{vars.DATABASE_HOSTNAME}}
      DATABASE_PORT: ${{vars.DATABASE_PORT}}
      DATABASE_NAME: ${{vars.DATABASE_NAME}}

      TESTING_USERNAME: ${{vars.TESTING_USERNAME}}
      TESTING_PASSWORD: ${{secrets.TESTING_PASSWORD}}
      TESTING_HOSTNAME: ${{vars.TESTING_HOSTNAME}}
      TESTING_PORT: ${{vars.TESTING_PORT}}
      TESTING_NAME: ${{vars.TESTING_NAME}}

      SECRET_KEY: ${{secrets.SECRET_KEY}}
      ALGORITHM: ${{secrets.ALGORITHM}}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{vars.ACCESS_TOKEN_EXPIRE_MINUTES}}
    runs-on: ubuntu-latest
    steps:
      - name: pulling git repo
        uses: actions/checkout@v7.0.0
      - name: install python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14.3'
      - name: upgrade pip
        run: python -m pip install --upgrade pip
      - name: intall dependencies
        run: pip install -r requirements.txt
      - name: test with pytest
        run: pytest -x
