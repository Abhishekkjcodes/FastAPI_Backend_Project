name: Build and Deploy code
on: [push,pull_request] #we can change behaviour accordign to branches but we have one one branch

jobs:
  setting-up:
    environment: 
      name: Testing
    env: 
      DATABASE_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
      DATABASE_USERNAME: ${{vars.DATABASE_USERNAME}}
      DATABASE_HOSTNAME: ${{vars.DATABASE_HOSTNAME}}
      DATABASE_PORT: ${{vars.DATABASE_PORT}}
      DATABASE_NAME: ${{vars.DATABASE_NAME}}

      TESTING_USERNAME: ${{vars.TESTING_USERNAME}}
      TESTING_PASSWORD: ${{secrets.TESTING_PASSWORD}}
      TESTING_HOSTNAME: ${{vars.TESTING_HOSTNAME}}
      TESTING_PORT: ${{vars.TESTING_PORT}}
      TESTING_NAME: ${{vars.TESTING_NAME}}

      SECRET_KEY: ${{secrets.SECRET_KEY}}
      ALGORITHM: ${{secrets.ALGORITHM}}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{vars.ACCESS_TOKEN_EXPIRE_MINUTES}}
      IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi-social-media
    runs-on: ubuntu-latest
    services: 
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{vars.TESTING_USERNAME}}
          POSTGRES_PASSWORD: ${{secrets.TESTING_PASSWORD}}
          POSTGRES_DB: ${{vars.TESTING_NAME}}

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: pulling git repo
        uses: actions/checkout@v7.0.0
      - name: install python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.12'
      - name: upgrade pip
        run: python -m pip install --upgrade pip
      - name: intall dependencies
        run: pip install -r requirements.txt
      - name: test with pytest
        run: pytest -x
      - name: Login to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_PAT}}
      - name: Debug
        run: |
          echo "IMAGE_NAME=$IMAGE_NAME"
          pwd
          ls -la
      #we can use buildx as well to do this but this is how its done without any github marketplace
      - name: Build Docker Image
        run: |
          set -x
          echo "$IMAGE_NAME"
          docker build \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            .
      - name: Push Image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
